<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URBAN DRIP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-top: 20px;
        }

        nav {
            background-color: #f1eded;
            padding: 10px 0;
            display: flex;
            justify-content: end;
            position: sticky;

        }

        nav ul {
            list-style-type: none;
            margin: 7px;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        nav ul li {
            margin: 0 15px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

        nav ul li a:hover {
            text-decoration: underline;
            text-decoration-color: #c22626;

        }


        nav a {
            position: relative;
        }

        nav a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0%;
            height: 2px;
            background: blue;
            transition: width 0.7s ease;
        }

        nav a:hover::after {
            width: 100%;
        }

        main {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
            align-items: center;
        }

        div {
            width: 450px;
            height: 450px;
            background-color: #fff;
            margin: 20px;


            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        div:hover {
            transform: scale(1.05);
        }

        button {
            display: block;
            text-align: center;
            padding: 20px;
            font-size: 24px;
            color: #333;
            text-transform: capitalize;

        }

        .card {
            width: 450px;
            height: 450px;
            background-color: #28282B;
            margin: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            overflow: hidden;
           
        }

        .card:hover {
            transform: scale(1.05);
        }

        /* Button animation */
        .cart-btn {
            padding: 12px 20px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            background-color: #1B1212;
            color: white;
            transition: all 0.3s ease;

        }

        .cart-btn:hover {
            background-color: #493737;
            transform: scale(1.1);
        }

        /* Click animation */
        .cart-btn:active {
            transform: scale(0.9);
        }

        /* Message below */
        .added-msg {
            margin-top: 10px;
            color: green;
            font-size: 16px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }

        /* Show message */
        .card.active .added-msg {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <script>
        document.querySelectorAll(".cart-btn").forEach(button => {
            button.addEventListener("click", function () {
                let card = this.parentElement;

                // add active class
                card.classList.add("active");

                // optional: remove after 2 sec
                setTimeout(() => {
                    card.classList.remove("active");
                }, 2000);
            });
        });
    </script>
    <h1>URBAN DRIP</h1>

    <nav>
        <ul>

            <li><a href="index.html"><IMG src="https://cdn-icons-png.flaticon.com/128/2550/2550264.png" height="20px"
                        alt="Home"></a></li>
            <li><a href="shop.html"><IMG src="https://cdn-icons-png.flaticon.com/128/833/833314.png" height="20px"
                        alt="Shop"> </a></li>
            <li><a href="about.html"><IMG src="https://cdn-icons-png.flaticon.com/128/1/1176.png" height="20px"
                        alt="About"> </a></li>
            <li><a href="contact.html"><IMG src="https://cdn-icons-png.flaticon.com/128/9581/9581121.png" height="20px"
                        alt="Contact"> </a></li>

        </ul>
    </nav>


    <main>
        <div class="card">
            <button class="cart-btn">shop now</button>
            <p class="added-msg">shop now✓</p>
        </div>
        <div class="card">

            <p class="added-msg">shop now ✓</p>
        </div>
        <div class="card">

            <p class="added-msg">shop now ✓</p>
        </div>
        <div class="card">
            <button class="cart-btn">shop now</button>
            <p class="added-msg">shop now ✓</p>
        </div>
        <div class="card">
            <button class="cart-btn">shop now</button>
            <p class="added-msg">shop now ✓</p>
        </div>
        <div class="card">
            <button class="cart-btn">shop now</button>
            <p class="added-msg">shop now ✓</p>
        </div>
    </main>

</body>

</html>
